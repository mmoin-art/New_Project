<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow | To-Do Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>TaskFlow</h1>
      <p>Stay on track with a lightweight, local-first to-do list.</p>
    </header>

    <section class="task-form-card">
      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="form-row">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="e.g., Plan sprint demo" required />
        </div>
        <div class="form-row">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3" placeholder="Add helpful context"></textarea>
        </div>
        <div class="form-row status-row">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Task</button>
          <button type="button" id="cancel-edit" class="ghost" hidden>Cancel</button>
        </div>
      </form>
    </section>

    <section class="filters">
      <div class="filter-buttons" role="tablist">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <div class="task-stats">
        <span id="total-count">0</span> tasks ·
        <span id="completed-count">0</span> done
      </div>
    </section>

    <section>
      <ul id="task-list" class="task-list" aria-live="polite"></ul>
      <div id="empty-state" class="empty-state">No tasks yet. Start by adding a goal above.</div>
    </section>
  </div>

  <template id="task-template">
    <li class="task-item">
      <div class="task-main">
        <div>
          <p class="task-title"></p>
          <p class="task-desc"></p>
        </div>
        <div class="task-meta">
          <span class="status-pill"></span>
          <span class="task-date"></span>
        </div>
      </div>
      <div class="task-actions">
        <button class="complete-btn" title="Toggle status"></button>
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
    </li>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
